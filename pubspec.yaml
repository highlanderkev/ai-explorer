name: ai_explorer
description: A Flutter application showcasing generative AI capabilities using GenUI and Firebase AI.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # GenUI and Firebase AI packages
  genui: ^0.6.1
  genui_firebase_ai: ^0.6.1
  
  # Firebase dependencies
  firebase_core: ^4.4.0
  firebase_ai: ^3.7.0
  
  # UI dependencies
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
