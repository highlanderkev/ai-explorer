name: Package

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string (e.g. 1.0.0+1)'
        required: false
        type: string
        default: ''
    outputs:
      web-artifact:
        description: 'Name of the uploaded web artifact'
        value: ${{ jobs.build_web.outputs.artifact-name }}
      android-artifact:
        description: 'Name of the uploaded Android artifact'
        value: ${{ jobs.build_android.outputs.artifact-name }}
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to embed (e.g. 1.0.0+1, leave blank to use pubspec version)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-output.outputs.artifact-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Override version in pubspec.yaml
        if: ${{ inputs.version != '' }}
        run: |
          VERSION="${{ inputs.version }}"
          # Strip leading 'v' if present (e.g. v1.0.0 -> 1.0.0)
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: ${VERSION}/" pubspec.yaml

      - name: Build Flutter web
        run: flutter build web --release

      - name: Archive web build
        run: |
          cd build/web
          zip -r ../../ai-explorer-web.zip .

      - name: Set artifact name output
        id: set-output
        run: echo "artifact-name=ai-explorer-web" >> "$GITHUB_OUTPUT"

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-explorer-web
          path: ai-explorer-web.zip
          retention-days: 7

  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-output.outputs.artifact-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Override version in pubspec.yaml
        if: ${{ inputs.version != '' }}
        run: |
          VERSION="${{ inputs.version }}"
          # Strip leading 'v' if present (e.g. v1.0.0 -> 1.0.0)
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: ${VERSION}/" pubspec.yaml

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk ai-explorer.apk

      - name: Set artifact name output
        id: set-output
        run: echo "artifact-name=ai-explorer-android" >> "$GITHUB_OUTPUT"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-explorer-android
          path: ai-explorer.apk
          retention-days: 7
