name: Package

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string (e.g. 1.0.0+1)'
        required: false
        type: string
        default: ''
    outputs:
      android_artifact:
        description: 'Name of the uploaded Android artifact'
        value: ${{ jobs.build_android.outputs.artifact_name }}
      ios_artifact:
        description: 'Name of the uploaded iOS artifact'
        value: ${{ jobs.build_ios.outputs.artifact_name }}
      web_artifact:
        description: 'Name of the uploaded web artifact'
        value: ${{ jobs.build_web.outputs.artifact_name }}
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to embed (e.g. 1.0.0+1, leave blank to use pubspec version)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.set_output.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Override version in pubspec.yaml
        if: ${{ inputs.version != '' }}
        run: |
          VERSION="${{ inputs.version }}"
          # Strip leading 'v' if present (e.g. v1.0.0 -> 1.0.0)
          VERSION="${VERSION#v}"
          # Append run number as build number if no '+<build>' is present,
          # so the Flutter build number (and Android versionCode) increments
          # with every CI run and APKs remain upgradable over previous releases.
          if [[ "${VERSION}" != *'+'* ]]; then
            VERSION="${VERSION}+${{ github.run_number }}"
          fi
          sed -i "s/^version: .*/version: ${VERSION}/" pubspec.yaml

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk ai-explorer.apk

      - name: Set artifact name output
        id: set_output
        run: echo "artifact_name=ai-explorer-android" >> "$GITHUB_OUTPUT"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-explorer-android
          path: ai-explorer.apk
          retention-days: 7

  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    outputs:
      artifact_name: ${{ steps.set_output.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Override version in pubspec.yaml
        if: ${{ inputs.version != '' }}
        run: |
          VERSION="${{ inputs.version }}"
          # Strip leading 'v' if present (e.g. v1.0.0 -> 1.0.0)
          VERSION="${VERSION#v}"
          # Append run number as build number if no '+<build>' is present,
          # so the Flutter build number increments with every CI run.
          if [[ "${VERSION}" != *'+'* ]]; then
            VERSION="${VERSION}+${{ github.run_number }}"
          fi
          # macOS sed requires an explicit empty string for in-place editing
          sed -i '' "s/^version: .*/version: ${VERSION}/" pubspec.yaml

      - name: Build iOS (no code sign)
        # Builds a release .app without code signing; suitable for CI artifacts.
        # For App Store / TestFlight distribution, add signing certificates and
        # use 'flutter build ipa' with appropriate provisioning profiles.
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ai-explorer.ipa Payload/
          rm -rf Payload

      - name: Set artifact name output
        id: set_output
        run: echo "artifact_name=ai-explorer-ios" >> "$GITHUB_OUTPUT"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-explorer-ios
          path: ai-explorer.ipa
          retention-days: 7

  build_web:
    name: Build Web (zip)
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.set_output.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Override version in pubspec.yaml
        if: ${{ inputs.version != '' }}
        run: |
          VERSION="${{ inputs.version }}"
          # Strip leading 'v' if present (e.g. v1.0.0 -> 1.0.0)
          VERSION="${VERSION#v}"
          # Append run number as build number if no '+<build>' is present
          if [[ "${VERSION}" != *'+'* ]]; then
            VERSION="${VERSION}+${{ github.run_number }}"
          fi
          sed -i "s/^version: .*/version: ${VERSION}/" pubspec.yaml

      - name: Build web (release)
        run: flutter build web --release

      - name: Package web build as zip
        run: |
          cd build/web
          zip -r ../../ai-explorer-web.zip .
          cd ../..

      - name: Set artifact name output
        id: set_output
        run: echo "artifact_name=ai-explorer-web" >> "$GITHUB_OUTPUT"

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-explorer-web
          path: ai-explorer-web.zip
          retention-days: 7
